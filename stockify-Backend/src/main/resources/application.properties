spring.application.name=Stockify-IMS
# Demo inventory + admin/clerk users when product table is empty (set false in production)
stockify.seed-demo-data=true
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/ims
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.mvc.view.prefix=/WEB-INF/view/
spring.mvc.view.suffix=.jsp
spring.mvc.view.cache=false

# Debug Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.FilterChainProxy=DEBUG

# SMTP configuration for OTP emails (set valid values in local env)
spring.mail.host=smtp.gmail.com
spring.mail.port=587

